version: 2

builds:
  - id: synack
    binary: synack
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

dockers_v2:
  - ids:
      - synack
    images:
      - "{{ .Env.ECR_REGISTRY }}/synack"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64

docker_signs:
  - artifacts: all
    cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes
    output: true

archives:
  - formats:
      - tar.gz

changelog:
  sort: asc
