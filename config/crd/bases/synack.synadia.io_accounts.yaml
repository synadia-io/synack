---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: accounts.synack.synadia.io
spec:
  group: synack.synadia.io
  names:
    kind: Account
    listKind: AccountList
    plural: accounts
    shortNames:
    - account
    singular: account
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.systemId
      name: System
      type: string
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .status.accountId
      name: AccountID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Account is the Schema for account resources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AccountSpec captures desired Account behavior in Control
              Plane terms.
            properties:
              accountId:
                description: |-
                  AccountID is the Control Plane account ID.
                  If omitted on create the controller will create the account and backfill the ID in status.
                type: string
              name:
                description: Name is the human-readable account name.
                type: string
              systemId:
                description: SystemID identifies the Control Plane system this account
                  belongs to.
