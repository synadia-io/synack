kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: objectstores.synack.synadia.io
spec:
  group: synack.synadia.io
  names:
    kind: ObjectStore
    listKind: ObjectStoreList
    plural: objectstores
    shortNames:
    - nsobject
    singular: objectstore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.bucket
      name: Bucket
      type: string
    - jsonPath: .status.ObjectStoreId
      name: ObjectStoreID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ObjectStore is the Schema for object store resources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ObjectStoreSpec captures desired Object Store behavior in
              Control Plane terms.
            properties:
              ObjectStoreId:
                description: ObjectStoreID optionally pins this resource to an existing
                  Control Plane object store ID.
                type: string
              accountId:
                description: AccountID identifies the target Control Plane account
