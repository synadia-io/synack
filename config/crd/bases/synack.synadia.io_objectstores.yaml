                - name
                type: object
              bucket:
                description: Bucket is the object store bucket name.
                type: string
              compression:
                description: Compression enables S2 compression when true.
                type: boolean
              description:
                description: Description is a human readable description.
                type: string
              maxBytes:
                description: MaxBytes limits total bytes for the bucket.
                type: integer
              metadata:
                additionalProperties:
                  type: string
                description: Metadata stores arbitrary bucket metadata.
                type: object
              placement:
                description: Placement controls cluster and tag placement requirements.
                properties:
                  cluster:
                    type: string
                  tags:
                    items:
                      type: string
                    type: array
                required:
                - cluster
                type: object
              replicas:
