---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: streams.synack.synadia.io
spec:
  group: synack.synadia.io
  names:
    kind: Stream
    listKind: StreamList
    plural: streams
    shortNames:
    - stream
    singular: stream
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.accountId
      name: AccountID
      type: string
    - jsonPath: .spec.accountPublicNKey
      name: AccountNKey
      type: string
    - jsonPath: .spec.name
      name: Name
      type: string
    - jsonPath: .status.streamId
      name: StreamID
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Stream is the Schema for stream resources.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: StreamSpec captures desired Stream behavior in Control Plane
              terms.
            properties:
              accountId:
                description: AccountID identifies the target Control Plane account
                  ID.
                type: string
              accountPublicNKey:
                description: |-
                  AccountPublicNKey identifies the target account by public NKEY.
                  When this is set, SystemID must also be set so lookup can be scoped.
                type: string
              accountRef:
                description: |-
                  AccountRef references an Account CR in the same namespace.
                  When set, the resource waits for the Account status.accountId and uses that ID.
                properties:
                  name:
                    description: Name is the referenced Account resource name in the
                      same namespace.
                    type: string
                required:
                - name
                type: object
              allowDirect:
                description: AllowDirect enables direct get APIs.
                type: boolean
              allowRollup:
                description: AllowRollup enables rollup headers.
                type: boolean
              compression:
                description: Compression controls stream compression. Currently "s2"
                  is supported.
                type: string
              denyDelete:
                description: DenyDelete blocks message delete APIs.
                type: boolean
              denyPurge:
                description: DenyPurge blocks stream purge APIs.
                type: boolean
              description:
                description: Description is a human readable stream description.
                type: string
              discard:
                description: 'Discard controls overflow behavior: old or new.'
                type: string
              discardPerSubject:
                description: DiscardPerSubject enables discard-new-per-subject behavior.
                type: boolean
              duplicateWindow:
                description: DuplicateWindow is a Go duration string used for duplicate
                  suppression.
                type: string
              firstSequence:
                description: FirstSequence sets initial sequence for new streams.
                format: int64
                type: integer
              maxAge:
                description: MaxAge is a Go duration string, for example "24h".
                type: string
              maxBytes:
                description: MaxBytes limits total bytes retained.
                type: integer
              maxConsumers:
                description: MaxConsumers limits the number of consumers on this stream.
                type: integer
              maxMsgSize:
                description: MaxMsgSize limits message size in bytes.
                type: integer
              maxMsgs:
                description: MaxMsgs limits total number of messages retained.
                type: integer
              maxMsgsPerSubject:
                description: MaxMsgsPerSubject limits messages retained per subject.
                type: integer
              metadata:
                additionalProperties:
                  type: string
                description: Metadata stores arbitrary stream metadata.
                type: object
              name:
                description: Name is the JetStream stream name.
                type: string
              noAck:
                description: NoAck disables acknowledgements for consumers.
                type: boolean
              placement:
                description: Placement controls cluster and tag placement requirements.
                properties:
                  cluster:
                    type: string
                  tags:
                    items:
                      type: string
                    type: array
                required:
                - cluster
                type: object
              replicas:
                description: Replicas controls stream replica count.
                type: integer
              republish:
                description: RePublish configures republish behavior.
                properties:
                  destination:
                    type: string
                  headers_only:
                    type: boolean
                  source:
                    type: string
                required:
                - destination
                - source
                type: object
              retention:
                description: 'Retention controls stream retention policy: limits,
                  interest, or workqueue.'
                type: string
              sealed:
                description: Sealed prevents further writes when enabled.
                type: boolean
              sources:
                description: Sources defines stream sources.
                items:
                  description: StreamSource defines a source stream configuration.
                  properties:
                    externalApiPrefix:
                      type: string
                    externalDeliverPrefix:
                      type: string
                    filterSubject:
                      type: string
                    name:
                      type: string
                    optStartSeq:
                      format: int64
                      minimum: 0
                      type: integer
                    optStartTime:
                      type: string
                    subjectTransforms:
                      items:
                        description: SubjectTransform describes a source/destination
                          subject transform.
                        properties:
                          dest:
                            type: string
                          source:
                            type: string
                        required:
                        - dest
                        - source
                        type: object
                      type: array
                  required:
                  - name
                  type: object
                type: array
              storage:
                description: 'Storage controls stream storage backend: file or memory.'
                type: string
              streamId:
                description: |-
                  StreamID optionally pins this resource to an existing Control Plane stream ID.
                  When set, reconciliation will try this ID first before name-based lookup.
                type: string
              subjectTransform:
                description: SubjectTransform configures subject transforms for incoming
                  messages.
                properties:
                  dest:
                    type: string
                  source:
                    type: string
                required:
                - dest
                - source
                type: object
              subjects:
                description: Subjects defines subjects associated with this stream.
                items:
                  type: string
                type: array
              systemId:
                description: SystemID scopes AccountPublicNKey resolution to a specific
                  system.
                type: string
            required:
            - name
            type: object
          status:
            description: StreamStatus reflects observed state from reconciliation.
            properties:
              lastSynced:
                type: string
              message:
                type: string
              observedGeneration:
                format: int64
                type: integer
              streamId:
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
